<svg xmlns="http://www.w3.org/2000/svg" viewBox="-40 -40 80 90" width="512" height="512">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00ffff" />
      <stop offset="100%" stop-color="#0066aa" />
    </linearGradient>
    <linearGradient id="flameGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00ffff" stop-opacity="1" />
      <stop offset="100%" stop-color="#0088ff" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- Glowing Aura Background -->
  <g filter="url(#glow)">
    <polygon points="0,-25 20,25 -20,25" fill="#00ffff" opacity="0.6" />
    <polygon points="-12,25 12,25 0,45" fill="#00ffff" opacity="0.8" />
  </g>

  <!-- Engine Flame -->
  <polygon points="-12,25 12,25 0,45" fill="url(#flameGrad)" />

  <!-- Main Body -->
  <polygon points="0,-25 20,25 -20,25" fill="url(#bodyGrad)" />

  <!-- Left Wing -->
  <polygon points="-20,25 -10,35 0,25" fill="#002244" />

  <!-- Right Wing -->
  <polygon points="20,25 10,35 0,25" fill="#002244" />

  <!-- Cockpit -->
  <ellipse cx="0" cy="0" rx="5" ry="10" fill="#00ffff" />
  <ellipse cx="0" cy="2" rx="3" ry="6" fill="#0088cc" />
</svg>
